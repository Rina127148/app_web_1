<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лаб 1</title>
    <style>
        body {
            background-color: #b2d8c6;  /* грязно-мятный фон */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c5e3f;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        h2 {
            color: #2c5e3f;
            border-bottom: 2px solid #b2d8c6;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Лаб 1</h1>

        <h2>1) ping kubsu.ru</h2>
        <img src="ping.png" alt="ping result">

        <h2>2) nslookup kubsu.ru (A-запись)</h2>
        <img src="nslookup_kubsu.png" alt="nslookup A kubsu.ru">

        <h2>3) nslookup kubsu.ru (MX-записи)</h2>
        <img src="nslookup_mx_kubsu.png" alt="nslookup MX kubsu.ru">

        <h2>4) nslookup kubsu-dev.ru (A-запись)</h2>
        <img src="nslookup_dev.png" alt="nslookup A kubsu-dev.ru">

        <h2>5) nslookup kubsu-dev.ru (MX-записи)</h2>
        <img src="nslookup_mx_dev.png" alt="nslookup MX kubsu-dev.ru">

        <h2>6) whois kubsu.ru (дата регистрации)</h2>
        <img src="whois_kubsu.png" alt="whois kubsu.ru">

        <h2>7) whois kubsu-dev.ru (дата регистрации)</h2>
        <img src="whois_dev.png" alt="whois kubsu-dev.ru">
        <h2>8) FileZilla</h2>
        <img src="filezilla.png" alt="filezilla">
    </div>
</body>
</html>
